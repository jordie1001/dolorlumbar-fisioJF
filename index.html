<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutina JF Fisioteràpia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #d4ff00; 
            --text: #ffffff;
            --muted: #a0a0a0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        header { padding: 20px; text-align: center; background: #111; border-bottom: 1px solid #222; }
        
        .cat-badge {
            background: #222; padding: 6px 12px; border-radius: 50px;
            font-size: 0.65rem; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .progress-wrap { height: 4px; background: #222; width: 100%; margin-top: 15px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }

        main { flex: 1; padding: 15px; display: flex; align-items: center; justify-content: center; }

        .card {
            background: var(--card); width: 100%; max-width: 450px;
            border-radius: 25px; padding: 25px; box-sizing: border-box;
            border: 1px solid #282828;
        }

        h2 { font-weight: 900; font-size: 1.4rem; margin: 5px 0; text-transform: uppercase; color: var(--accent); }
        .instructions { color: var(--muted); font-size: 0.8rem; margin-bottom: 15px; }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #000; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .stat-label { display: block; font-size: 0.55rem; color: var(--muted); text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; font-weight: 900; color: var(--text); }

        .main-btn {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            background: var(--accent); color: #000;
        }

        .main-btn.next { background: #fff; }

        .warning {
            margin-top: 15px; font-size: 0.65rem; color: #ff4444;
            text-align: center; font-weight: 700; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <span class="cat-badge" id="cat-text">Carregant...</span>
    <div class="progress-wrap"><div class="progress-fill" id="p-bar"></div></div>
</header>

<main>
    <div class="card">
        <h2 id="title">Títol</h2>
        <p class="instructions" id="desc">Descripció de l'exercici</p>

        <div class="video-container" id="video-frame">
            </div>

        <div class="counter-grid">
            <div class="stat-box">
                <span class="stat-label">Objectiu</span>
                <span class="stat-val" id="goal">15</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Fetes</span>
                <span class="stat-val" id="curr">0</span>
            </div>
        </div>

        <button class="main-btn" id="go-btn" onclick="handlePress()">Comptar Repetició</button>
        
        <div class="warning">⚠ Dolor màxim: 3/10</div>
    </div>
</main>

<script>
    // Funció per netejar la URL de Drive i fer-la reproduïble en iframe
    function getEmbedUrl(url) {
        return url.replace('/view', '/preview');
    }

    const data = [
        { t: "Cat/Camel", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/1Yy0PFXDm23_z1i3OxAvM9q1v-e12ouSq/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Dorsal quadrupèdia", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/1Y4XAoUatDpi9iY-lB25P3MHtYG-D1nqt/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Dorsal foam roller", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/16RmoJ5EYa1RERpbujP3E0rDDP6wEazI-/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Rotació decúbit lateral", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/1oW-xTXMxIky94Ehv7FBk7C7914Ev_wLm/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Rotació decúbit supí", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/1LDflA1NHhvWHk7mkSNcW4esEyj8cZgPj/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Rotació dorsal paret", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/17Ch7Qr_GFa2-bScT48Sjy2sP2Dn5_bp_/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Rotació dorsal (variant)", d: 15, c: "Mobilitat Matí", v: "https://drive.google.com/file/d/1hMREG9GFWH3_ImTZ1mMwAp2iiYG5KKaM/view", i: "Cada matí: 10-15 repeticions [cite: 2, 4]" },
        { t: "Hip thrust", d: 15, c: "Força", v: "https://drive.google.com/file/d/1sT3iBVxzDw9nWjuC4_CV43VjyPEkcBp7/view", i: "3 dies/setmana, 3 x 10-15 reps [cite: 2, 6]" },
        { t: "Gluti mig - planxa", d: 15, c: "Força", v: "https://drive.google.com/file/d/1OiiUaTYDzQGLhEtkAj5JLbPq6VSb2qU-/view", i: "3 dies/setmana, 3 x 10-15 reps [cite: 2, 6]" },
        { t: "Squat a calaix", d: 15, c: "Força", v: "https://drive.google.com/file/d/1kAyDJ6SFC_l15916aaS6e3YcF8t7E8kT/view", i: "3 dies/setmana, 3 x 10-15 reps [cite: 2, 6]" },
        { t: "Estirament posterior", d: 1, c: "Vespre", v: "https://drive.google.com/file/d/1LDflA1NHhvWHk7mkSNcW4esEyj8cZgPj/view", i: "Mantenir 5-10 minuts. Gluti a terra i genolls estesos [cite: 2, 9, 11, 12]" }
    ];

    let idx = 0; 
    let currentReps = 0;

    function render() {
        const item = data[idx];
        document.getElementById('title').innerText = item.t;
        document.getElementById('desc').innerText = item.i;
        document.getElementById('cat-text').innerText = item.c;
        document.getElementById('goal').innerText = item.d;
        document.getElementById('curr').innerText = currentReps;
        
        // Progress bar
        document.getElementById('p-bar').style.width = ((idx / data.length) * 100) + "%";

        // Actualitzar vídeo només si canviem d'exercici
        const frameContainer = document.getElementById('video-frame');
        const embedUrl = getEmbedUrl(item.v);
        frameContainer.innerHTML = `<iframe src="${embedUrl}" allow="autoplay"></iframe>`;

        // Botó
        const btn = document.getElementById('go-btn');
        if (currentReps >= item.d) {
            btn.innerText = "Següent Exercici →";
            btn.classList.add('next');
        } else {
            btn.innerText = item.d > 1 ? "Comptar Repetició" : "Marcar com Fet";
            btn.classList.remove('next');
        }
    }

    function handlePress() {
        const item = data[idx];
        if (currentReps < item.d) {
            currentReps++;
            document.getElementById('curr').innerText = currentReps;
            if (currentReps >= item.d) {
                render(); // Actualitza el botó a "Següent"
            }
        } else {
            // Passar al següent exercici
            if (idx < data.length - 1) {
                idx++;
                currentReps = 0;
                render();
            } else {
                alert("Rutina completada! [cite: 1]");
                idx = 0;
                currentReps = 0;
                render();
            }
        }
    }

    // Inici
    render();
</script>

</body>
</html>
