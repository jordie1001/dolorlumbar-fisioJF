<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF Fisioteràpia - Rutina Lumbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Nou esquema de colors: Vermell/Blau/Negre */
            --bg-gradient: radial-gradient(circle at top right, #1a0505, #050505, #050a1a);
            --card-bg: rgba(20, 20, 20, 0.8);
            --accent: linear-gradient(135deg, #ff3c3c 0%, #3c78ff 100%);
            --text-main: #ffffff;
            --text-secondary: #cccccc;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 15px 10px;
            text-align: center;
        }

        /* Logo 25% més petit */
        .logo { max-width: 110px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }

        .progress-container { width: 95%; margin: 0 auto; }

        .progress-text { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--text-main); 
            margin-bottom: 4px; 
            text-align: right; 
            letter-spacing: 1px;
        }

        /* Barra 2px més gruixuda (6px total) */
        .progress-wrap { height: 6px; background: rgba(255,255,255,0.1); border-radius: 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.6s ease; }

        main { flex: 1; padding: 10px; display: flex; align-items: flex-start; justify-content: center; }

        .card {
            background: var(--card-bg); 
            width: 100%; 
            max-width: 500px;
            /* Cantonades més rectes */
            border-radius: 15px; 
            padding: 15px; 
            box-sizing: border-box;
            position: relative; 
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .ex-bg-num {
            position: absolute; top: 10px; right: 15px;
            font-size: 5rem; font-weight: 900;
            color: rgba(255,255,255,0.03);
            z-index: 0; pointer-events: none;
        }

        .content { position: relative; z-index: 1; }

        .cat-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #3c78ff; }

        h2 { font-weight: 900; font-size: 1.6rem; margin: 5px 0; text-transform: uppercase; color: #fff; }
        
        .instructions { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 15px; line-height: 1.3; }

        /* Menys aire als costats per fer el vídeo més gran */
        .video-container {
            width: calc(100% + 0px); 
            aspect-ratio: 16/9; 
            background: #000;
            border-radius: 8px; 
            overflow: hidden; 
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .stats-row { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 0 5px; }
        
        /* Tipografia de labels més gran i llegible */
        .stat-item span { display: block; font-size: 0.9rem; color: #fff; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-item b { font-size: 2.2rem; font-weight: 900; color: #ff3c3c; }

        .timer-display { font-size: 3rem; font-weight: 900; color: #ff3c3c; text-align: center; margin-bottom: 15px; display: none; }

        .btn-group { display: flex; gap: 8px; width: 100%; }

        .btn-count {
            flex: 0 0 75%; padding: 18px; border-radius: 10px; border: none;
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1rem;
            text-transform: uppercase; cursor: pointer;
            background: var(--accent); color: #fff;
            box-shadow: 0 4px 15px rgba(255, 60, 60, 0.3);
        }

        .btn-next {
            flex: 1; padding: 18px; border-radius: 10px; border: 1px solid #444;
            background: rgba(255,255,255,0.05); color: #fff; cursor: pointer;
            font-size: 1.4rem; font-weight: 900;
        }

        .list-info { font-size: 0.8rem; color: #bbb; margin-top: 15px; padding-left: 20px; display: none; }
        .list-info li { margin-bottom: 8px; }
    </style>
</head>
<body>

<header>
    <img src="https://jfcentredefisioterapia.com/wp-content/uploads/2025/07/jf-fisioterapia-1.png" class="logo" alt="JF Fisioteràpia">
    <div class="progress-container">
        <div class="progress-text" id="progressText">0% — 1/11</div>
        <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>
    </div>
</header>

<main>
    <div class="card">
        <div class="ex-bg-num" id="exNum">01</div>
        <div class="content">
            <div class="cat-label" id="catLabel">Mobilitat Matí</div>
            <h2 id="exTitle">Cat/Camel</h2>
            <p class="instructions" id="exDesc">10-15 repeticions</p>

            <div class="video-container" id="videoBox"></div>

            <div id="repsStats" class="stats-row">
                <div class="stat-item"><span>OBJECTIU</span><b id="goalVal">15</b></div>
                <div class="stat-item"><span>FETES</span><b id="currVal">0</b></div>
            </div>

            <div id="timerDisplay" class="timer-display">00:00</div>
            <ul id="extraInfo" class="list-info"></ul>

            <div class="btn-group">
                <button class="btn-count" id="mainBtn" onclick="handleMain()">Comptar</button>
                <button class="btn-next" onclick="nextEx()">→</button>
            </div>
        </div>
    </div>
</main>

<script>
    const data = [
        { t: "Cat/Camel", d: 15, c: "Mobilitat Matí", v: "1Yy0PFXDm23_z1i3OxAvM9q1v-e12ouSq", i: "Cada matí: 10-15 repeticions" },
        { t: "Dorsal quadrupèdia", d: 15, c: "Mobilitat Matí", v: "1Y4XAoUatDpi9iY-lB25P3MHtYG-D1nqt", i: "Cada matí: 10-15 repeticions" },
        { t: "Dorsal foam roller", d: 15, c: "Mobilitat Matí", v: "16RmoJ5EYa1RERpbujP3E0rDDP6wEazI-", i: "Cada matí: 10-15 repeticions" },
        { t: "Rotació decúbit lateral", d: 15, c: "Mobilitat Matí", v: "1oW-xTXMxIky94Ehv7FBk7C7914Ev_wLm", i: "Cada matí: 10-15 repeticions" },
        { t: "Rotació decúbit supí", d: 15, c: "Mobilitat Matí", v: "1LDflA1NHhvWHk7mkSNcW4esEyj8cZgPj", i: "Cada matí: 10-15 repeticions" },
        { t: "Rotació dorsal paret", d: 15, c: "Mobilitat Matí", v: "17Ch7Qr_GFa2-bScT48Sjy2sP2Dn5_bp_", i: "Cada matí: 10-15 repeticions" },
        { t: "Rotació dorsal (variant)", d: 15, c: "Mobilitat Matí", v: "1hMREG9GFWH3_ImTZ1mMwAp2iiYG5KKaM", i: "Cada matí: 10-15 repeticions" },
        { t: "Hip thrust", d: 15, c: "Força", v: "1sT3iBVxzDw9nWjuC4_CV43VjyPEkcBp7", i: "3 sèries de 10-15 reps" },
        { t: "Gluti mig - planxa", d: 15, c: "Força", v: "1OiiUaTYDzQGLhEtkAj5JLbPq6VSb2qU-", i: "3 sèries de 10-15 reps" },
        { t: "Squat a calaix", d: 15, c: "Força", v: "1kAyDJ6SFC_l15916aaS6e3YcF8t7E8kT", i: "3 sèries de 10-15 reps" },
        { t: "Cadena Posterior", d: 0, c: "Vespre", v: "1PbvOW70tQ4Sajl1rbJMKIkSwdjEw_q0-", i: "5-10 minuts mantinguts", 
          notes: ["El gluti sempre ha de tocar a terra", "Genolls en extensió màxima", "Respiració lenta i controlada", "Sensació còmoda, no dolorosa"] 
        }
    ];

    let idx = 0; let reps = 0; let timerInterval; let seconds = 0;

    function render() {
        const item = data[idx];
        document.getElementById('exNum').innerText = (idx + 1).toString().padStart(2, '0');
        document.getElementById('exTitle').innerText = item.t;
        document.getElementById('exDesc').innerText = item.i;
        document.getElementById('catLabel').innerText = item.c;
        document.getElementById('goalVal').innerText = item.d;
        document.getElementById('currVal').innerText = reps;
        document.getElementById('videoBox').innerHTML = `<iframe src="https://drive.google.com/file/d/${item.v}/preview"></iframe>`;
        
        const percent = Math.round((idx / data.length) * 100);
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('progressText').innerText = `${percent}% — ${idx + 1}/${data.length}`;

        if (item.d === 0) {
            document.getElementById('repsStats').style.display = 'none';
            document.getElementById('timerDisplay').style.display = 'block';
            document.getElementById('mainBtn').innerText = "Iniciar";
            document.getElementById('extraInfo').style.display = 'block';
            document.getElementById('extraInfo').innerHTML = item.notes.map(n => `<li>${n}</li>`).join('');
        } else {
            document.getElementById('repsStats').style.display = 'flex';
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('mainBtn').innerText = "Comptar";
            document.getElementById('extraInfo').style.display = 'none';
            clearInterval(timerInterval); timerInterval = null;
        }
    }

    function handleMain() {
        if (data[idx].d > 0) {
            reps++; document.getElementById('currVal').innerText = reps;
        } else {
            if (!timerInterval) {
                document.getElementById('mainBtn').innerText = "Aturar";
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').innerText = `${m}:${s}`;
                }, 1000);
            } else {
                clearInterval(timerInterval); timerInterval = null;
                document.getElementById('mainBtn').innerText = "Reprendre";
            }
        }
    }

    function nextEx() {
        if (idx < data.length - 1) {
            idx++; reps = 0; seconds = 0;
            document.getElementById('timerDisplay').innerText = "00:00";
            render();
        } else { alert("Rutina Finalitzada!"); }
    }

    render();
</script>
</body>
</html>
