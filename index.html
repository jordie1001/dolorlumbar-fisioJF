<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF Fisioteràpia - Rutina Lumbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: linear-gradient(135deg, #d4ff00 0%, #88ff00 100%);
            --text: #ffffff;
            --muted: #666;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, #111 0%, transparent 100%);
        }

        .logo { max-width: 150px; margin-bottom: 20px; }

        .progress-container {
            width: 90%; max-width: 400px; margin: 0 auto;
            text-align: right;
        }

        .progress-text { font-size: 0.7rem; font-weight: 900; color: #d4ff00; margin-bottom: 5px; }

        .progress-wrap { height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

        main { flex: 1; padding: 20px; display: flex; align-items: center; justify-content: center; }

        .card {
            background: var(--card); width: 100%; max-width: 450px;
            border-radius: 40px; padding: 40px; box-sizing: border-box;
            position: relative; border: 1px solid #222;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .ex-bg-num {
            position: absolute; top: 20px; right: 30px;
            font-size: 6rem; font-weight: 900;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            z-index: 0; pointer-events: none;
        }

        .content { position: relative; z-index: 1; }

        .cat-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

        h2 { font-weight: 900; font-size: 1.8rem; margin: 10px 0; text-transform: uppercase; letter-spacing: -1px; }
        
        .instructions { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }

        .video-container {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 24px; overflow: hidden; margin-bottom: 30px;
            border: 1px solid #333;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .stats-row { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .stat-item span { display: block; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
        .stat-item b { font-size: 1.8rem; font-weight: 900; }

        /* Cronòmetre */
        .timer-display { font-size: 2.5rem; font-weight: 900; color: #d4ff00; text-align: center; margin-bottom: 20px; display: none; }

        .btn-group { display: flex; gap: 10px; width: 100%; }

        .btn-count {
            flex: 0 0 75%; padding: 22px; border-radius: 20px; border: none;
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.9rem;
            text-transform: uppercase; cursor: pointer;
            background: var(--accent); color: #000;
        }

        .btn-next {
            flex: 1; padding: 22px; border-radius: 20px; border: 1px solid #333;
            background: transparent; color: #fff; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }

        .list-info { font-size: 0.75rem; color: #888; text-align: left; padding-left: 15px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<header>
    <img src="https://jfcentredefisioterapia.com/wp-content/uploads/2025/07/jf-fisioterapia-1.png" class="logo" alt="JF Fisioteràpia">
    <div class="progress-container">
        <div class="progress-text" id="progressText">0% — EXERCICI 1/11</div>
        <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>
    </div>
</header>

<main>
    <div class="card">
        <div class="ex-bg-num" id="exNum">01</div>
        <div class="content">
            <div class="cat-label" id="catLabel">Mobilitat Matí</div>
            <h2 id="exTitle">Cat/Camel</h2>
            <p class="instructions" id="exDesc">Cada matí: 10-15 repeticions [cite: 2, 4]</p>

            <div class="video-container" id="videoBox"></div>

            <div id="repsStats" class="stats-row">
                <div class="stat-item"><span>Objectiu</span><b id="goalVal">15</b></div>
                <div class="stat-item"><span>Fetes</span><b id="currVal">0</b></div>
            </div>

            <div id="timerDisplay" class="timer-display">00:00</div>

            <ul id="extraInfo" class="list-info"></ul>

            <div class="btn-group">
                <button class="btn-count" id="mainBtn" onclick="handleMain()">Comptar</button>
                <button class="btn-next" onclick="nextEx()">→</button>
            </div>
        </div>
    </div>
</main>

<script>
    const data = [
        { t: "Cat/Camel", d: 15, c: "Mobilitat Matí", v: "1Yy0PFXDm23_z1i3OxAvM9q1v-e12ouSq", i: "10-15 repeticions [cite: 4]" },
        { t: "Dorsal quadrupèdia", d: 15, c: "Mobilitat Matí", v: "1Y4XAoUatDpi9iY-lB25P3MHtYG-D1nqt", i: "10-15 repeticions [cite: 4]" },
        { t: "Dorsal foam roller", d: 15, c: "Mobilitat Matí", v: "16RmoJ5EYa1RERpbujP3E0rDDP6wEazI-", i: "10-15 repeticions [cite: 4]" },
        { t: "Rotació decúbit lateral", d: 15, c: "Mobilitat Matí", v: "1oW-xTXMxIky94Ehv7FBk7C7914Ev_wLm", i: "10-15 repeticions [cite: 4]" },
        { t: "Rotació decúbit supí", d: 15, c: "Mobilitat Matí", v: "1LDflA1NHhvWHk7mkSNcW4esEyj8cZgPj", i: "10-15 repeticions [cite: 4]" },
        { t: "Rotació dorsal paret", d: 15, c: "Mobilitat Matí", v: "17Ch7Qr_GFa2-bScT48Sjy2sP2Dn5_bp_", i: "10-15 repeticions [cite: 4]" },
        { t: "Rotació dorsal (variant)", d: 15, c: "Mobilitat Matí", v: "1hMREG9GFWH3_ImTZ1mMwAp2iiYG5KKaM", i: "10-15 repeticions [cite: 4]" },
        { t: "Hip thrust", d: 15, c: "Força", v: "1sT3iBVxzDw9nWjuC4_CV43VjyPEkcBp7", i: "3 sèries de 10-15 reps [cite: 6]" },
        { t: "Gluti mig - planxa", d: 15, c: "Força", v: "1OiiUaTYDzQGLhEtkAj5JLbPq6VSb2qU-", i: "3 sèries de 10-15 reps [cite: 6]" },
        { t: "Squat a calaix", d: 15, c: "Força", v: "1kAyDJ6SFC_l15916aaS6e3YcF8t7E8kT", i: "3 sèries de 10-15 reps [cite: 6]" },
        { t: "Cadena Posterior", d: 0, c: "Vespre", v: "1PbvOW70tQ4Sajl1rbJMKIkSwdjEw_q0-", i: "5-10 minuts mantinguts [cite: 9]", 
          notes: ["Gluti sempre a terra [cite: 11]", "Genolls en extensió màxima [cite: 12]", "Respiració lenta nasal [cite: 13]", "Sensació còmoda, no dolorosa [cite: 14]"] 
        }
    ];

    let idx = 0; let reps = 0; let timerInterval; let seconds = 0;

    function render() {
        const item = data[idx];
        document.getElementById('exNum').innerText = (idx + 1).toString().padStart(2, '0');
        document.getElementById('exTitle').innerText = item.t;
        document.getElementById('exDesc').innerText = item.i;
        document.getElementById('catLabel').innerText = item.c;
        document.getElementById('goalVal').innerText = item.d;
        document.getElementById('currVal').innerText = reps;
        document.getElementById('videoBox').innerHTML = `<iframe src="https://drive.google.com/file/d/${item.v}/preview"></iframe>`;
        
        // Progress
        const percent = Math.round((idx / data.length) * 100);
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('progressText').innerText = `${percent}% — EXERCICI ${idx + 1}/${data.length}`;

        // Cronòmetre o Reps
        if (item.d === 0) {
            document.getElementById('repsStats').style.display = 'none';
            document.getElementById('timerDisplay').style.display = 'block';
            document.getElementById('mainBtn').innerText = "Iniciar Crono";
            document.getElementById('extraInfo').style.display = 'block';
            document.getElementById('extraInfo').innerHTML = item.notes.map(n => `<li>${n}</li>`).join('');
        } else {
            document.getElementById('repsStats').style.display = 'flex';
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('mainBtn').innerText = "Comptar";
            document.getElementById('extraInfo').style.display = 'none';
            clearInterval(timerInterval);
        }
    }

    function handleMain() {
        if (data[idx].d > 0) {
            reps++;
            document.getElementById('currVal').innerText = reps;
        } else {
            if (!timerInterval) {
                document.getElementById('mainBtn').innerText = "Aturar";
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').innerText = `${m}:${s}`;
                }, 1000);
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('mainBtn').innerText = "Reprendre";
            }
        }
    }

    function nextEx() {
        if (idx < data.length - 1) {
            idx++; reps = 0; seconds = 0;
            document.getElementById('timerDisplay').innerText = "00:00";
            render();
        } else {
            alert("Rutina Finalitzada!");
        }
    }

    render();
</script>
</body>
</html>
